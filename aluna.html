.treino-card{flex:0 0 92%;scroll-snap-align:center;border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.18);transition:transform .3s ease,opacity .3s ease,box-shadow .3s ease;transform:scale(0.82);opacity:.65}

function getPlaylist(nome) {
  var n = normVideo(nome).replace(/-/g,' ');
  for (var i = 0; i < KEYWORDS.length; i++) {
    if (n.indexOf(KEYWORDS[i][0]) >= 0) {
      return PLAYLISTS[KEYWORDS[i][1]] || null;
    }
  }
  return null;
}

function findVideo(nome) {
  if (!nome) return null;
  var key = normVideo(nome);
  if (videosDB[key]) return videosDB[key];
  // Try partial match
  var keys = Object.keys(videosDB);
  for (var i = 0; i < keys.length; i++) {
    if (keys[i].startsWith(key) || key.startsWith(keys[i])) return videosDB[keys[i]];
  }
  // Try word-by-word match
  var words = key.split('-').filter(function(w){ return w.length > 3; });
  for (var j = 0; j < keys.length; j++) {
    var match = words.every(function(w){ return keys[j].includes(w); });
    if (match) return videosDB[keys[j]];
  }
  return null;
}

function renderHist() {
  var el = document.getElementById('hist-lista');
  if (!el) return;
  var fbs = aluna.feedbacks || [];
  if (!fbs.length) { el.textContent = 'Nenhum feedback ainda.'; return; }
  var html = '';
  for (var fi = fbs.length - 1; fi >= 0; fi--) {
    var fb = fbs[fi];
    html += '<div style="border:1px solid var(--lgrey);border-radius:8px;padding:12px;margin-bottom:10px">';
    html += '<div style="font-weight:700;margin-bottom:8px;color:var(--gold)">Semana ' + (fb.sem||'?') + ' — ' + (fb.data||'') + '</div>';
    if (fb.peso)    html += '<div style="font-size:13px;margin-bottom:4px">⚖️ Peso: <b>' + fb.peso + ' kg</b></div>';
    if (fb.treinos) html += '<div style="font-size:13px;margin-bottom:4px">🏋️ Treinos: ' + fb.treinos + '</div>';
    if (fb.dieta)   html += '<div style="font-size:13px;margin-bottom:4px">🥗 Dieta: ' + fb.dieta + '</div>';
    if (fb.agua)    html += '<div style="font-size:13px;margin-bottom:4px">💧 Água: ' + fb.agua + '</div>';
    if (fb.sono)    html += '<div style="font-size:13px;margin-bottom:4px">😴 Sono: ' + fb.sono + '</div>';
    // Legacy: pesos array from old format
    if (!fb.peso && fb.pesos && fb.pesos.length) {
      for (var pi = fb.pesos.length-1; pi>=0; pi--) {
        if (fb.pesos[pi]) { html += '<div style="font-size:13px;margin-bottom:4px">⚖️ Peso: <b>' + fb.pesos[pi] + ' kg</b></div>'; break; }
      }
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

window.enviarFeedback = function() {
  var sem = (document.getElementById('f-sem')||{}).value||'';
  var treinos = (document.getElementById('f-treinos')||{}).value||'';
  var pesoHoje = (document.getElementById('f-peso-hoje')||{}).value||'';
  var dieta = (document.getElementById('f-dieta')||{}).value||'';
  var agua = (document.getElementById('f-agua')||{}).value||'';
  var sono = (document.getElementById('f-sono')||{}).value||'';
  if (!sem) { alert('Selecione a semana antes de enviar.'); return; }
  var sbtn = document.querySelector('.subbtn');
  if (sbtn) { sbtn.disabled=true; sbtn.textContent='Enviando...'; }
  var entry = { sem:sem, treinos:treinos, peso:pesoHoje, dieta:dieta, agua:agua, sono:sono, data:new Date().toLocaleDateString('pt-BR') };
  db.collection('alunas').doc(alunaId).update({
    feedbacks: firebase.firestore.FieldValue.arrayUnion(entry),
    semAtual: parseInt(sem)
  }).then(function() {
    if (!aluna.feedbacks) aluna.feedbacks = [];
    aluna.feedbacks.push(entry);
    aluna.semAtual = parseInt(sem);
    if (sbtn) { sbtn.disabled=false; sbtn.textContent='Enviar Feedback 🚀'; }
    alert('✅ Feedback enviado!');
    renderHist();
  }).catch(function() {
    if (sbtn) { sbtn.disabled=false; sbtn.textContent='Enviar Feedback 🚀'; }
    alert('Erro ao enviar. Tente novamente.');
  });
}

// ── INIT ──────────────────────────────────────────
function init() {
  if (!alunaId) { mostrarErro('Link inválido', 'Nenhuma aluna especificada neste link.'); return; }

  // Step 1: Load aluna with timeout
  withTimeout(db.collection('alunas').doc(alunaId).get(), 10000)
    .then(function(snap) {
      if (!snap.exists) { mostrarErro('Treino não encontrado', 'Verifique o link com seu treinador.'); return; }
      aluna = snap.data();
      cargas = aluna.cargas || {};

      // Step 2: Render immediately — protected from internal errors
      try {
        renderPage();
      } catch(re) {
        console.error('renderPage error:', re);
        // Render minimal fallback
        document.getElementById('tabs-wrap').style.display = 'flex';
        document.getElementById('main-wrap').innerHTML =
          '<div class="pg on" id="pg-treinos"><div id="treinos-container"></div><div id="cardio-abd-container" style="margin-top:16px"></div></div>' +
          '<div class="pg" id="pg-feedback"></div>' +
          '<div class="pg" id="pg-historico"></div>' +
          '<div class="pg" id="pg-orientacoes"></div>';
        try { renderTreinos(); } catch(e2) {}
        try { renderCardioAbd(); } catch(e2) {}
      }

      // Step 3: Load videos in background
      db.collection('videos').get()
        .then(function(vsnap) {
          vsnap.forEach(function(d) { videosDB[d.id] = d.data().url; });
          try { renderTreinos(); } catch(e) {}
        })
        .catch(function(e) { console.log('Videos not loaded:', e); });
    })
    .catch(function(e) {
      if (e.message === 'timeout') {
        mostrarErro('Tempo esgotado', 'Não foi possível carregar seu treino. Verifique sua conexão e tente novamente.');
      } else {
        mostrarErro('Erro ao carregar', 'Verifique sua conexão e tente novamente.');
      }
    });
}

// ── CAROUSEL SCALE EFFECT ──────────────────
function initCarouselScale() {
  var carousel = document.querySelector('.treino-carousel');
  if (!carousel) return;
  var cards = carousel.querySelectorAll('.treino-card');
  if (!cards.length) return;

  function updateScale() {
    var cRect = carousel.getBoundingClientRect();
    var cCenter = cRect.left + cRect.width / 2;
    var closest = 0;
    var minDist = Infinity;
    for (var i = 0; i < cards.length; i++) {
      var r = cards[i].getBoundingClientRect();
      var cardCenter = r.left + r.width / 2;
      var dist = Math.abs(cCenter - cardCenter);
      if (dist < minDist) { minDist = dist; closest = i; }
    }
    for (var j = 0; j < cards.length; j++) {
      if (j === closest) {
        cards[j].className = 'treino-card active';
      } else {
        cards[j].className = 'treino-card';
      }
    }
  }

  carousel.addEventListener('scroll', updateScale, {passive:true});
  updateScale();
}
